name: Prebuilt SignApk Download (No AOSP Source Compile)
on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: Select AOSP Tag
        required: false
        default: all
        type: choice
        options:
          - all
          - android-12.0.0_r1
          - android-13.0.0_r1
          - android-14.0.0_r1
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  OUTPUT_ROOT: ${{ github.workspace }}/artifacts-signapk
  BC_CACHE: ${{ github.workspace }}/bc-cache

jobs:
  fetch-signapk:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        aosp_tag:
          - android-12.0.0_r1
          - android-13.0.0_r1
        include:
          - aosp_tag: android-12.0.0_r1
            bc_ver: 1.69
            bc_type: jdk15on
          - aosp_tag: android-13.0.0_r1
            bc_ver: 1.69
            bc_type: jdk15on
          - aosp_tag: android-14.0.0_r1
            bc_ver: 1.70
            bc_type: jdk17on
    steps:
      - name: Cache BouncyCastle jars
        uses: actions/cache@v4
        with:
          path: ${{ env.BC_CACHE }}
          key: bc-${{ matrix.bc_type }}-${{ matrix.bc_ver }}

      - name: Install lightweight dependencies
        run: |
          set -eo pipefail
          export DEBIAN_FRONTEND=noninteractive
          export APT_LISTCHANGES_FRONTEND=none
          sudo sed -i 's/archive.ubuntu.com/mirrors.tuna.tsinghua.edu.cn/g' /etc/apt/sources.list
          sudo apt-get clean && sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends curl wget unzip

      - name: Download BouncyCastle libs
        env:
          BC_DIR: ${{ env.BC_CACHE }}/${{ matrix.bc_type }}-${{ matrix.bc_ver }}
        run: |
          set -eo pipefail
          mkdir -p "$BC_DIR"
          cd "$BC_DIR"
          BC_PROV=bcprov-${{ matrix.bc_type }}-${{ matrix.bc_ver }}.jar
          BC_PKIX=bcpkix-${{ matrix.bc_type }}-${{ matrix.bc_ver }}
          if [ ! -f "$BC_PROV" ]; then
            wget --timeout=120 https://repo1.maven.org/maven2/org/bouncycastle/bcprov-${{ matrix.bc_type }}/${{ matrix.bc_ver }}/$BC_PROV || \
            wget --timeout=120 https://maven.aliyun.com/repository/public/org/bouncycastle/bcprov-${{ matrix.bc_type }}/${{ matrix.bc_ver }}/$BC_PROV
          fi
          if [ ! -f "$BC_PKIX.jar" ]; then
            wget --timeout=120 https://repo1.maven.org/maven2/org/bouncycastle/bcpkix-${{ matrix.bc_type }}/${{ matrix.bc_ver }}/$BC_PKIX.jar || \
            wget --timeout=120 https://maven.aliyun.com/repository/public/org/bouncycastle/bcpkix-${{ matrix.bc_type }}/${{ matrix.bc_ver }}/$BC_PKIX.jar
          fi

      - name: Download official prebuilt signapk.jar
        env:
          TAG: ${{ matrix.aosp_tag }}
          OUT_DIR: ${{ env.OUTPUT_ROOT }}/$TAG
          BC_DIR: ${{ env.BC_CACHE }}/${{ matrix.bc_type }}-${{ matrix.bc_ver }}
        run: |
          set -eo pipefail
          mkdir -p "$OUT_DIR"
          cd "$OUT_DIR"
          # AOSP官方预编译signapk 备用双源
          wget --timeout=180 https://android.googlesource.com/platform/prebuilts/build-tools/+archive/refs/tags/$TAG/linux-x86/bin/signapk.tar.gz -O signapk.tgz || \
          wget --timeout=180 https://dl.google.com/android/build-tools/$TAG/signapk.tar.gz -O signapk.tgz
          tar -zxf signapk.tgz
          rm -f signapk.tgz
          # 复制BC依赖包
          cp "$BC_DIR"/bc*.jar ./
          # 生成使用文档
          cat > README.md <<EOF
          # SignApk Package Info
          AOSP Tag: $TAG
          BouncyCastle: ${{ matrix.bc_ver }} (${{ matrix.bc_type }})
          ## Linux/macOS 签名命令
          java -cp "signapk.jar:bcprov-${{ matrix.bc_type }}-${{ matrix.bc_ver }}.jar:bcpkix-${{ matrix.bc_ver }}.jar" com.android.signapk.SignApk platform.x509.pem platform.pk8 unsigned.apk signed.apk
          ## Windows CMD
          java -cp "signapk.jar;bcprov-${{ matrix.bc_type }}-${{ matrix.bc_ver }}.jar;bcpkix-${{ matrix.bc_ver }}.jar" com.android.signapk platform.x509.pem platform.pk8 unsigned.apk signed.apk
          EOF
          ls -lh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: signapk-${{ matrix.aosp_tag }}
          path: ${{ env.OUTPUT_ROOT }}/${{ matrix.aosp_tag }}
          retention-days: 30

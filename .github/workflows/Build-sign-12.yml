name: Build SignApk android-12.0.0_r1
on:
  workflow_dispatch:

env:
  AOSP_BASE_DIR: ${{ github.workspace }}/aosp-cache
  BC_BASE_DIR: ${{ github.workspace }}/bc-cache
  OUTPUT_DIR: ${{ github.workspace }}/artifacts
  TARGET_TAG: android-12.0.0_r1
  BC_VERSION: '1.69'
  BC_ARTIFACT: 'jdk15on'
  JDK_VER: '8'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build-signapk:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Setup JDK ${{ env.JDK_VER }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JDK_VER }}

      - name: Verify Java environment
        run: |
          set -eo pipefail
          echo JAVA_HOME=$JAVA_HOME
          java -version
          javac -version
          if [[ "$JDK_VER" == "8" ]]; then
            java -version 2>&1 | grep 1.8 || exit 1
          fi

      - name: Cache AOSP source & BC jars
        uses: actions/cache@v4
        id: cache-store
        with:
          path: |
            ${{ env.AOSP_BASE_DIR }}/${{ env.TARGET_TAG }}
            ${{ env.BC_BASE_DIR }}/bc-${{ env.BC_VERSION }}
          key: ubuntu-signapk-${{ env.TARGET_TAG }}-${{ env.BC_ARTIFACT }}-${{ env.BC_VERSION }}

      - name: Install system dependencies
        run: |
          set -eo pipefail
          export DEBIAN_FRONTEND=noninteractive
          export APT_LISTCHANGES_FRONTEND=none
          sudo sed -i 's/archive.ubuntu.com/mirrors.tuna.tsinghua.edu.cn/g' /etc/apt/sources.list
          sudo sed -i 's/security.ubuntu.com/mirrors.tuna.tsinghua.edu.cn/g' /etc/apt/sources.list
          sudo apt-get clean && sudo apt-get update -y
          sudo apt-get -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" install -y --no-install-recommends git wget zip unzip curl
          sudo rm -f /etc/ca-certificates/update.d/jks-keystore

      - name: Install JDK8
        run: |
          set -eo pipefail
          export DEBIAN_FRONTEND=noninteractive
          export APT_LISTCHANGES_FRONTEND=none
          sudo rm -f /etc/ca-certificates/update.d/jks-keystore
          sudo mv /usr/bin/update-ca-certificates /usr/bin/update-ca-certificates.bak || true
          sudo apt-get -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" install -y --no-install-recommends openjdk-8-jdk-headless
          sudo update-ca-certificates --fresh >/dev/null 2>&1 || true
          echo JDK install done

      - name: Download BouncyCastle jars
        env:
          BC_CACHE_DIR: ${{ env.BC_BASE_DIR }}/bc-${{ env.BC_VERSION }}
        run: |
          set -eo pipefail
          mkdir -p "$BC_CACHE_DIR"
          cd "$BC_CACHE_DIR"
          BC_PROV=bcprov-${{ env.BC_ARTIFACT }}-${{ env.BC_VERSION }}.jar
          BC_PKIX=bcpkix-${{ env.BC_ARTIFACT }}-${{ env.BC_VERSION }}.jar
          if [[ -f "$BC_PROV" && -f "$BC_PKIX" ]]; then
            echo BC jars cached, skip download
            exit 0
          fi
          curl -L -o "$BC_PROV" https://repo1.maven.org/maven2/org/bouncycastle/bcprov-${{ env.BC_ARTIFACT }}/${{ env.BC_VERSION }}/$BC_PROV || \
          curl -L -o "$BC_PROV" https://maven.aliyun.com/repository/public/org/bouncycastle/bcprov-${{ env.BC_ARTIFACT }}/${{ env.BC_VERSION }}/$BC_PROV
          curl -L -o "$BC_PKIX" https://repo1.maven.org/maven2/org/bcpkix/bcpkix-${{ env.BC_ARTIFACT }}/${{ env.BC_VERSION }}/$BC_PKIX || \
          curl -L -o "$BC_PKIX" https://maven.aliyun.com/repository/public/org/bcpkix/bcpkix-${{ env.BC_ARTIFACT }}/${{ env.BC_VERSION }}/$BC_PKIX
          jar tf "$BC_PROV" | head -2

      - name: Download AOSP source (build + libcore + apksig)
        run: |
          set -eo pipefail
          export GIT_HTTP_TIMEOUT=300
          TARGET_ROOT=${{ env.AOSP_BASE_DIR }}/${{ env.TARGET_TAG }}
          mkdir -p "$TARGET_ROOT"
          cd "$TARGET_ROOT"
          get_commit(){
            local repo=$1
            git ls-remote --tags https://android.googlesource.com/$repo | grep refs/tags/${{ env.TARGET_TAG }}$ | awk '{print $1}'
          }
          # 1 build/tools/signapk
          if [ ! -d build/tools/signapk ]; then
            mkdir build
            cd build
            wget --timeout=300 https://android.googlesource.com/platform/build/+archive/refs/tags/${{ env.TARGET_TAG }}/tools/signapk.tar.gz -O signapk.tar.gz
            mkdir tmp
            tar -zxf signapk.tar.gz -C tmp
            mkdir -p tools/signapk
            mv tmp/* tools/signapk/
            rm -rf tmp signapk.tar.gz
            cd "$TARGET_ROOT"
          fi
          # 2 libcore
          if [ ! -d libcore ]; then
            LC_COMMIT=$(get_commit platform/libcore)
            wget --timeout=300 https://android.googlesource.com/platform/libcore/+archive/$LC_COMMIT.tar.gz -O libcore.tar.gz
            mkdir libcore
            tar -zxf libcore.tar.gz -C libcore
            rm libcore.tar.gz
          fi
          # 3 apksig
          if [ ! -d apksig ]; then
            APK_COMMIT=$(get_commit platform/tools/apksig)
            wget --timeout=300 https://android.googlesource.com/platform/tools/apksig/+archive/$APK_COMMIT.tar.gz -O apksig.tar.gz
            mkdir apksig
            tar -zxf apksig.tar.gz -C apksig
            rm apksig.tar.gz
          fi
          ls -la build/tools/signapk/src/com/android/signapk/

      - name: Copy build script & BC libs & fix imports
        env:
          TARGET_ROOT: ${{ env.AOSP_BASE_DIR }}/${{ env.TARGET_TAG }}
          BC_CACHE_DIR: ${{ env.BC_BASE_DIR }}/bc-${{ env.BC_VERSION }}
        run: |
          set -eo pipefail
          SIGNAPK_DIR=$TARGET_ROOT/build/tools/signapk
          mkdir -p $SIGNAPK_DIR/libs
          # 安全复制BC，不存在不报错
          if compgen -G "$BC_CACHE_DIR/bc*.jar" > /dev/null; then
            cp "$BC_CACHE_DIR"/bc*.jar $SIGNAPK_DIR/libs/
          else
            echo Warning: No BC jars found, skip copy
          fi
          # 复制编译脚本并赋予执行权限
          cp main-repo/scripts/build-signapk_single.sh $SIGNAPK_DIR/
          chmod +x $SIGNAPK_DIR/build-signapk_single.sh
          # 删除不兼容导入语句，路径完全匹配tree结构
          JAVA_FILE=$SIGNAPK_DIR/src/com/android/signapk/SignApk.java
          sed -i '/import org.bouncycastle.asn1.DEROutputStream;/d' "$JAVA_FILE"
          sed -i '/import org.bouncycastle.asn1.cms;/d' "$JAVA_FILE"
          sed -i '/import org.conscrypt/d' "$JAVA_FILE"

      - name: Run build signapk.jar
        env:
          TARGET_ROOT: ${{ env.AOSP_BASE_DIR }}/${{ env.TARGET_TAG }}
        run: |
          set -eo pipefail
          cd $TARGET_ROOT/build/tools/signapk
          ./build-signapk_single.sh
          test -f dist/signapk.jar
          ls -lh dist/

      - name: Package output artifact
        env:
          TARGET_ROOT: ${{ env.AOSP_BASE_DIR }}/${{ env.TARGET_TAG }}
          OUT: ${{ env.OUTPUT_DIR }}/${{ env.TARGET_TAG }}
          BC_CACHE_DIR: ${{ env.BC_BASE_DIR }}/bc-${{ env.BC_VERSION }}
        run: |
          set -eo pipefail
          mkdir -p "$OUT"
          cp $TARGET_ROOT/build/tools/signapk/dist/signapk.jar "$OUT/"
          cp "$BC_CACHE_DIR"/bc*.jar "$OUT/" 2>/dev/null || true
          cat > "$OUT/README.md" << EOF
          AOSP Tag: ${{ env.TARGET_TAG }}
          BC Version: ${{ env.BC_VERSION }} (${{ env.BC_ARTIFACT }})
          java -cp "signapk.jar:bcprov-${{ env.BC_ARTIFACT }}-${{ env.BC_VERSION }}.jar:bcpkix-${{ env.BC_VERSION }}.jar" com.android.signapk.SignApk
          EOF
          ls -lh "$OUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: signapk-${{ env.TARGET_TAG }}
          path: ${{ env.OUTPUT_DIR }}/${{ env.TARGET_TAG }}
          retention-days: 14

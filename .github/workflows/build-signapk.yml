name: Build signapk.jar with BouncyCastle
on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Target Android AOSP branch'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - android-12.0.0_r1
          - android-13.0.0_r1
          - android-14.0.0_r1
  push:
    branches: [ main, develop ]
    paths:
      - 'scripts/**'
      - '.github/workflows/Build-signapk.yml'
  pull_request:
    branches: [ main ]

env:
  AOSP_BASE_DIR: '${{ github.workspace }}/aosp-cache'
  BC_BASE_DIR: '${{ github.workspace }}/bc-cache'
  OUTPUT_DIR: '${{ github.workspace }}/artifacts'

jobs:
  build-signapk:
    name: Build signapk.jar (${{ matrix.android_branch }})
    runs-on: ubuntu-latest
    # 新增：单任务最大运行25分钟，避免apt安装被提前取消
    timeout-minutes: 25
    strategy:
      matrix:
        android_branch: 
          - android-12.0.0_r1
          - android-13.0.0_r1
          - android-14.0.0_r1
        include:
          - android_branch: android-12.0.0_r1
            bc_version: '1.85'
            bc_artifact: 'jdk18on'
            java_version: '8'
            repo_init_args: '--depth=1 --partial-clone --clone-filter=blob:limit=10M'
          - android_branch: android-13.0.0_r1
            bc_version: '1.85'
            bc_artifact: 'jdk18on'
            java_version: '8'
            repo_init_args: '--depth=1 --partial-clone --clone-filter=blob:limit=10M'
          - android_branch: android-14.0.0_r1
            bc_version: '1.85'
            bc_artifact: 'jdk18on'
            java_version: '11'
            repo_init_args: '--depth=1 --partial-clone --clone-filter=blob:limit=10M'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: main-repo

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java_version }}

      - name: Verify Java Env
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          javac -version
          if [[ "${{ matrix.java_version }}" == "8" ]]; then
            java -version 2>&1 | grep -q "1.8" || exit 1
          fi

      - name: Network Check Maven
        run: |
          curl --connect-timeout 10 --retry 3 -I https://repo1.maven.org/maven2/ || (echo "Maven Central unreachable" && exit 1)

      - name: Cache AOSP & BC Lib
        uses: actions/cache@v4
        id: cache-signapk
        with:
          path: |
            ${{ env.AOSP_BASE_DIR }}/${{ matrix.android_branch }}
            ${{ env.BC_BASE_DIR }}/bc-${{ matrix.bc_version }}
          key: ${{ runner.os }}-signapk-${{ matrix.android_branch }}-${{ matrix.bc_artifact }}-${{ matrix.bc_version }}-${{ hashFiles('main-repo/scripts/setup-env.sh','main-repo/scripts/build-signapk.sh') }}
          restore-keys: |
            ${{ runner.os }}-signapk-${{ matrix.android_branch }}-${{ matrix.bc_artifact }}
            ${{ runner.os }}-signapk-${{ matrix.android_branch }}
            ${{ runner.os }}-signapk-

      - name: Install Minimal System Dependencies (Opt speed, only required JDK)
        run: |
          # 切换清华镜像加速apt，解决国外源慢超时
          sudo sed -i 's/archive.ubuntu.com/mirrors.tuna.tsinghua.edu.cn/g' /etc/apt/sources.list
          sudo sed -i 's/security.ubuntu.com/mirrors.tuna.tsinghua.edu.cn/g' /etc/apt/sources.list
          sudo apt-get clean
          sudo apt-get update -y --fix-missing
          
          # 仅安装当前job需要的JDK，不重复装双JDK减少耗时
          JDK_PKG=""
          if [[ "${{ matrix.java_version }}" == "8" ]]; then
            JDK_PKG="openjdk-8-jdk-headless"
          else
            JDK_PKG="openjdk-11-jdk-headless"
          fi
          
          sudo apt-get install -y --no-install-recommends \
            git-core gnupg flex bison build-essential zip unzip curl python3 python3-pip $JDK_PKG
          
          # 清理缓存减小磁盘占用，避免IO拖慢
          sudo apt-get autoremove -y
          sudo apt-get clean

      - name: Git Global Config
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git config --global core.autocrlf input

      - name: Install AOSP repo tool
        run: |
          # 下载官方repo脚本
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o ~/.local/bin/repo
          chmod a+x ~/.local/bin/repo
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          # 验证repo可用
          repo --version

      - name: Download BouncyCastle
        env:
          BC_CACHE_DIR: ${{ env.BC_BASE_DIR }}/bc-${{ matrix.bc_version }}
        run: |
          mkdir -p "$BC_CACHE_DIR"
          cd "$BC_CACHE_DIR"
          BC_PROV=bcprov-${{ matrix.bc_artifact }}-${{ matrix.bc_version }}.jar
          BC_PKIX=bcpkix-${{ matrix.bc_artifact }}-${{ matrix.bc_version }}.jar
          if [[ -f "$BC_PROV" && -f "$BC_PKIX" ]]; then
            echo "BC lib cached, skip download"
            exit 0
          fi
          curl -L -o "$BC_PROV" "https://repo1.maven.org/maven2/org/bouncycastle/bcprov-${{ matrix.bc_artifact }}/${{ matrix.bc_version }}/$BC_PROV"
          curl -L -o "$BC_PKIX" "https://repo1.maven.org/maven2/org/bouncycastle/bcpkix-${{ matrix.bc_artifact }}/${{ matrix.bc_version }}/$BC_PKIX"
          jar tf "$BC_PROV" | head -3
          jar tf "$BC_PKIX" | head -3

      - name: Prepare AOSP Minimal Source
        env:
          AOSP_DIR: ${{ env.AOSP_BASE_DIR }}/${{ matrix.android_branch }}
        run: |
          mkdir -p "$AOSP_DIR"
          cd "$AOSP_DIR"
          if [[ -d ".repo" ]]; then
            echo "Sync cached AOSP minimal modules"
            repo sync -c -j$(nproc) --no-tags --no-clone-bundle --force-sync --retry-fetches=3 build/tools/signapk libcore
          else
            echo "Init & Sync minimal AOSP for signapk only"
            repo init -u https://android.googlesource.com/platform/manifest -b ${{ matrix.android_branch }} ${{ matrix.repo_init_args }}
            repo sync -c -j$(nproc) --no-tags --no-clone-bundle --force-sync --retry-fetches=3 build/tools/signapk libcore
          fi

      - name: Copy Build Script & BC Lib
        run: |
          AOSP_DIR=${{ env.AOSP_BASE_DIR }}/${{ matrix.android_branch }}
          BC_CACHE=${{ env.BC_BASE_DIR }}/bc-${{ matrix.bc_version }}
          mkdir -p "$AOSP_DIR/build/tools/signapk/libs"
          cp "$BC_CACHE"/bc*.jar "$AOSP_DIR/build/tools/signapk/libs/"
          cp main-repo/scripts/build-signapk.sh "$AOSP_DIR/build/tools/signapk/"
          chmod +x "$AOSP_DIR/build/tools/signapk/build-signapk.sh"
          cp -r main-repo/test "$AOSP_DIR/build/tools/signapk/" 2>/dev/null || true

      - name: Build signapk.jar
        env:
          AOSP_DIR: ${{ env.AOSP_BASE_DIR }}/${{ matrix.android_branch }}
        run: |
          cd "$AOSP_DIR/build/tools/signapk"
          ./build-signapk.sh
          test -f dist/signapk.jar || exit 1
          ls -lh dist/signapk.jar

      - name: Lightweight Sign Test (No zipalign dependency)
        env:
          AOSP_DIR: ${{ env.AOSP_BASE_DIR }}/${{ matrix.android_branch }}
          BC_CACHE_DIR: ${{ env.BC_BASE_DIR }}/bc-${{ matrix.bc_version }}
        run: |
          cd "$AOSP_DIR/build/tools/signapk"
          # Generate test platform key
          openssl genrsa -out test.key 2048
          openssl pkcs8 -in test.key -topk8 -outform DER -out test.pk8 -nocrypt
          openssl req -new -x509 -key test.key -out test.pem -days 9999 -subj "/C=US/ST=California/L=Mountain View/O=Android/OU=Android/CN=Android/emailAddress=android@android.com"
          # Minimal unsigned zip as dummy apk
          echo '<?xml version="1.0"?><manifest package="com.test"/>' > AndroidManifest.xml
          zip test-unsigned.apk AndroidManifest.xml
          # Sign
          BC_PROV=libs/bcprov-${{ matrix.bc_artifact }}-${{ matrix.bc_version }}.jar
          BC_PKIX=libs/bcpkix-${{ matrix.bc_artifact }}-${{ matrix.bc_version }}.jar
          java -cp "dist/signapk.jar:$BC_PROV:$BC_PKIX" com.android.signapk.SignApk test.pem test.pk8 test-unsigned.apk test-signed.apk
          # Verify jar signature
          jarsigner -verify test-signed.apk
          # Clean
          rm -f test.key test.pk8 test.pem *.apk AndroidManifest.xml

      - name: Package Artifacts
        env:
          AOSP_DIR: ${{ env.AOSP_BASE_DIR }}/${{ matrix.android_branch }}
          OUTPUT_PATH: ${{ env.OUTPUT_DIR }}/${{ matrix.android_branch }}
        run: |
          mkdir -p "$OUTPUT_PATH"
          BC_PROV=bcprov-${{ matrix.bc_artifact }}-${{ matrix.bc_version }}.jar
          BC_PKIX=bcpkix-${{ matrix.bc_artifact }}-${{ matrix.bc_version }}.jar
          cp "$AOSP_DIR/build/tools/signapk/dist/signapk.jar" "$OUTPUT_PATH/signapk_${{ matrix.android_branch }}_bc${{ matrix.bc_version }}.jar"
          cp "${{ env.BC_BASE_DIR }}/bc-${{ matrix.bc_version }}/$BC_PROV" "$OUTPUT_PATH/"
          cp "${{ env.BC_BASE_DIR }}/bc-${{ matrix.bc_version }}/$BC_PKIX" "$OUTPUT_PATH/"
          cat > "$OUTPUT_PATH/README.md" << EOF
          # signapk.jar Build Info
          - AOSP Branch: ${{ matrix.android_branch }}
          - BouncyCastle: ${{ matrix.bc_version }} (${{ matrix.bc_artifact }})
          - Build JDK: ${{ matrix.java_version }}

          ## Linux/macOS Usage
          \`\`\`bash
          java -cp "signapk_${{ matrix.android_branch }}_bc${{ matrix.bc_version }}.jar:$BC_PROV:$BC_PKIX" \\
          com.android.signapk.SignApk platform.x509.pem platform.pk8 raw.apk signed.apk
          \`\`\`
          ## Windows CMD Usage (use ; split classpath)
          \`\`\`cmd
          java -cp "signapk_${{ matrix.android_branch }}_bc${{ matrix.bc_version }}.jar;$BC_PROV;$BC_PKIX" com.android.signapk.SignApk platform.x509.pem platform.pk8 raw.apk signed.apk
          \`\`\`
          EOF
          ls -lh "$OUTPUT_PATH/"

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: signapk-${{ matrix.android_branch }}-bc${{ matrix.bc_version }}
          path: ${{ env.OUTPUT_DIR }}/${{ matrix.android_branch }}
          retention-days: 14

  post-build:
    name: Build Summary Report
    runs-on: ubuntu-latest
    needs: build-signapk
    if: always()
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
      - name: Generate Report
        run: |
          echo "# SignApk Build Summary $(date -u)" > build-report.md
          for dir in all-artifacts/*; do
            [ -d "$dir" ] || continue
            branch=$(basename "$dir" | sed -E 's/signapk-(.*)-bc[0-9.]+/\1/')
            bcver=$(basename "$dir" | grep -o 'bc[0-9.]*')
            echo "## $branch ($bcver)" >> build-report.md
            ls -lh "$dir" | awk '{print "- " $9 " (" $5 ")"}' >> build-report.md
            echo "" >> build-report.md
          done
          cat build-report.md
      - name: Upload Summary
        uses: actions/upload-artifact@v4
        with:
          name: build-summary-report
          path: build-report.md


name: Build signapk.jar with BouncyCastle
on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Target Android AOSP branch'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - android-12.0.0_r1
          - android-13.0.0_r1
          - android-14.0.0_r1
  push:
    branches: [ main, develop ]
    paths:
      - 'scripts/**'
      - '.github/workflows/Build-signapk.yml'
  pull_request:
    branches: [ main ]
env:
  AOSP_BASE_DIR: '${{ github.workspace }}/aosp-cache'
  BC_BASE_DIR: '${{ github.workspace }}/bc-cache'
  OUTPUT_DIR: '${{ github.workspace }}/artifacts'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  build-signapk:
    name: Build signapk.jar (${{ matrix.android_branch }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      TMPDIR: /tmp
    strategy:
      matrix:
        android_branch: 
          - android-12.0.0_r1
          - android-13.0.0_r1
          - android-14.0.0_r1
        include:
          - android_branch: android-12.0.0_r1
            bc_version: '1.85'
            bc_artifact: 'jdk18on'
            java_version: '8'
          - android_branch: android-13.0.0_r1
            bc_version: '1.85'
            bc_artifact: 'jdk18on'
            java_version: '8'
          - android_branch: android-14.0.0_r1
            bc_version: '1.85'
            bc_artifact: 'jdk18on'
            java_version: '11'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: main-repo
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java_version }}
      - name: Verify Java Env
        run: |
          set -eo pipefail
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          javac -version
          if [[ "${{ matrix.java_version }}" == "8" ]]; then
            java -version 2>&1 | grep -q "1.8" || exit 1
          fi
      - name: Cache AOSP & BC Lib
        uses: actions/cache@v4
        id: cache-signapk
        with:
          path: |
            ${{ env.AOSP_BASE_DIR }}/${{ matrix.android_branch }}
            ${{ env.BC_BASE_DIR }}/bc-${{ matrix.bc_version }}
          key: ${{ runner.os }}-signapk-${{ matrix.android_branch }}-${{ matrix.bc_artifact }}-${{ matrix.bc_version }}-${{ hashFiles('main-repo/scripts/build-signapk.sh') }}
          restore-keys: |
            ${{ runner.os }}-signapk-${{ matrix.android_branch }}-${{ matrix.bc_artifact }}
            ${{ runner.os }}-signapk-${{ matrix.android_branch }}
            ${{ runner.os }}-signapk-
      - name: Install basic lightweight apt tools
        run: |
          set -eo pipefail
          export DEBIAN_FRONTEND=noninteractive
          export APT_LISTCHANGES_FRONTEND=none
          sudo sed -i 's/archive.ubuntu.com/mirrors.tuna.tsinghua.edu.cn/g' /etc/apt/sources.list
          sudo sed -i 's/security.ubuntu.com/mirrors.tuna.tsinghua.edu.cn/g' /etc/apt/sources.list
          sudo apt-get clean
          sudo apt-get update -y --fix-missing
          sudo apt-get -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" install -y --no-install-recommends git-core gnupg zip unzip curl python3 python3-pip
          sudo rm -f /etc/ca-certificates/update.d/jks-keystore
      - name: Install target JDK only
        run: |
          set -eo pipefail
          export DEBIAN_FRONTEND=noninteractive
          export APT_LISTCHANGES_FRONTEND=none
          sudo rm -f /etc/ca-certificates/update.d/jks-keystore
          sudo mv /usr/bin/update-ca-certificates /usr/bin/update-ca-certificates.bak || true
          if [[ "${{ matrix.java_version }}" == "8" ]]; then
            echo "Install openjdk-8-jdk-headless"
            sudo apt-get -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" install -y --no-install-recommends openjdk-8-jdk-headless
          else
            echo "Install openjdk-11-jdk-headless"
            sudo apt-get -o Dpkg::Options::="--force-confdef" -o Dpkg::Options::="--force-confold" install -y --no-install-recommends openjdk-11-jdk-headless
          fi
          sudo update-ca-certificates --fresh >/dev/null 2>&1 || true
          echo "JDK install complete"
      - name: Git Global Config
        run: |
          set -eo pipefail
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git config --global core.autocrlf input
      - name: Download BouncyCastle Dependencies
        env:
          BC_CACHE_DIR: ${{ env.BC_BASE_DIR }}/bc-${{ matrix.bc_version }}
        run: |
          set -eo pipefail
          mkdir -p "$BC_CACHE_DIR"
          cd "$BC_CACHE_DIR"
          BC_PROV=bcprov-${{ matrix.bc_artifact }}-${{ matrix.bc_version }}.jar
          BC_PKIX=bcpkix-${{ matrix.bc_artifact }}-${{ matrix.bc_version }}.jar
          if [[ -f "$BC_PROV" && -f "$BC_PKIX" ]]; then
            echo "BC lib cached, skip download"
            exit 0
          fi
          curl -L -o "$BC_PROV" "https://repo1.maven.org/maven2/org/bouncycastle/bcprov-${{ matrix.bc_artifact }}/${{ matrix.bc_version }}/$BC_PROV" || \
          curl -L -o "$BC_PROV" "https://maven.aliyun.com/repository/public/org/bouncycastle/bcprov-${{ matrix.bc_artifact }}/${{ matrix.bc_version }}/$BC_PROV"
          curl -L -o "$BC_PKIX" "https://repo1.maven.org/maven2/org/bouncycastle/bcpkix-${{ matrix.bc_artifact }}/${{ matrix.bc_version }}/$BC_PKIX" || \
          curl -L -o "$BC_PKIX" "https://maven.aliyun.com/repository/public/org/bouncycastle/bcpkix-${{ matrix.bc_artifact }}/${{ matrix.bc_version }}/$BC_PKIX"
          jar tf "$BC_PROV" | head -3
          jar tf "$BC_PKIX" | head -3
      - name: Download AOSP Full Source (build + libcore + apksig)
        run: |
          set -eo pipefail
          export GIT_HTTP_TIMEOUT=300
          AOSP_DIR="${{ env.AOSP_BASE_DIR }}"
          TARGET_TAG="${{ matrix.android_branch }}"
          TARGET_ROOT="$AOSP_DIR/$TARGET_TAG"
          mkdir -p "$TARGET_ROOT"
          cd "$TARGET_ROOT"
          get_commit(){
            local REPO_PATH=$1
            git ls-remote --tags "https://android.googlesource.com/$REPO_PATH" | grep "refs/tags/$TARGET_TAG$" | awk '{print $1}'
          }
          # 1. Download build/tools/signapk 修复压缩包层级
          if [ ! -d "$TARGET_ROOT/build/tools/signapk" ]; then
            mkdir -p "$TARGET_ROOT/build"
            cd "$TARGET_ROOT/build"
            wget --timeout=300 -O signapk.tar.gz "https://android.googlesource.com/platform/build/+archive/refs/tags/$TARGET_TAG/tools/signapk.tar.gz"
            mkdir tmp_extract
            tar -zxf signapk.tar.gz -C tmp_extract
            mkdir -p tools/signapk
            mv tmp_extract/* tools/signapk/
            rm -rf tmp_extract signapk.tar.gz
            cd "$TARGET_ROOT"
            if [ ! -d "$TARGET_ROOT/build/tools/signapk/src/com/android/signapk" ]; then
              echo "FATAL: signapk source unpack failed"
              exit 2
            fi
          fi
          # 2. Download libcore
          if [ ! -d "$TARGET_ROOT/libcore" ]; then
            COMMIT_LC=$(get_commit platform/libcore)
            wget --timeout=300 -O libcore.tar.gz "https://android.googlesource.com/platform/libcore/+archive/$COMMIT_LC.tar.gz"
            mkdir libcore
            tar -zxf libcore.tar.gz -C libcore
            rm -f libcore.tar.gz
          fi
          # 3. 新增 apksig 源码（修复ApkSignerEngine类缺失关键）
          if [ ! -d "$TARGET_ROOT/apksig" ]; then
            COMMIT_APK=$(get_commit platform/tools/apksig)
            wget --timeout=300 -O apksig.tar.gz "https://android.googlesource.com/platform/tools/apksig/+archive/$COMMIT_APK.tar.gz"
            mkdir apksig
            tar -zxf apksig.tar.gz -C apksig
            rm -f apksig.tar.gz
          fi
          ls -la "$TARGET_ROOT/build/tools/signapk/" "$TARGET_ROOT/apksig/" "$TARGET_ROOT/libcore/"
      - name: Copy Build Script & Mod Compile Config
        env:
          AOSP_DIR: ${{ env.AOSP_BASE_DIR }}/${{ matrix.android_branch }}
          BC_CACHE_DIR: ${{ env.BC_BASE_DIR }}/bc-${{ matrix.bc_version }}
        run: |
          set -eo pipefail
          SIGNAPK_PATH="$AOSP_DIR/build/tools/signapk"
          mkdir -p "$SIGNAPK_PATH/libs"
          cp "$BC_CACHE_DIR"/bc*.jar "$SIGNAPK_PATH/libs/"
          cp main-repo/scripts/build-signapk.sh "$SIGNAPK_PATH/"
          chmod +x "$SIGNAPK_PATH/build-signapk.sh"
          cp -r main-repo/test "$SIGNAPK_PATH/" 2>/dev/null || true
          # 更换sed分隔符# 解决路径/冲突报错
          sed -i 's#find "$SCRIPT_DIR/src"#find "$SCRIPT_DIR/src" "$SCRIPT_DIR/../../apksig/src"#g' "$SIGNAPK_PATH/build-signapk.sh"
          # 移除conscrypt不存在的导入语句
          sed -i '/import org.conscrypt/d' "$SIGNAPK_PATH/src/com/android/signapk/SignApk.java"
      - name: Build sign.jar
        env:
          AOSP_DIR: ${{ env.AOSP_BASE_DIR }}
          TAG: ${{ matrix.android_branch }}
        run: |
          set -eo pipefail
          cd "$AOSP_DIR/$TAG/build/tools/signapk"
          ./build-signapk.sh
          test -f dist/signapk.jar || exit 1
          ls -lh dist/signapk.jar
      - name: Lightweight Sign Functional Test
        env:
          AOSP_DIR: ${{ env.AOSP_BASE_DIR }}/${{ matrix.android_branch }}
          BC_CACHE_DIR: ${{ env.BC_BASE_DIR }}/bc-${{ matrix.bc_version }}
        run: |
          set -eo pipefail
          cd "$AOSP_DIR/build/tools/signapk"
          openssl genrsa -out test.key 2048
          openssl pkcs8 -in test.key -topk8 -outform DER -out test.pk8 -nocrypt
          openssl req -new -x509 -key test.key -out test.pem -days 9999 -subj "/C=US/ST=California/L=Mountain View/O=Android/OU=Android/CN=Android/emailAddress=android@android.com"
          echo '<?xml version="1.0"?><manifest package="com.test" />' > AndroidManifest.xml
          zip test-unsigned.apk AndroidManifest.xml
          BC_PROV=libs/bcprov-${{ matrix.bc_artifact }}-${{ matrix.bc_version }}.jar
          BC_PKIX=libs/bcpkix-${{ matrix.bc_artifact }}-${{ matrix.bc_version }}.jar
          java -cp "dist/signapk.jar:$BC_PROV:$BC_PKIX" com.android.signapk.SignApk test.pem test.pk8 test-unsigned.apk test-signed.apk
          jarsigner -verify test-signed.apk
          rm -f test.key test.pk8 test.pem *.apk AndroidManifest.xml
      - name: Package Build Artifacts
        env:
          AOSP_DIR: ${{ env.AOSP_BASE_DIR }}/${{ matrix.android_branch }}
          OUTPUT_PATH: ${{ env.OUTPUT_DIR }}/${{ matrix.android_branch }}
        run: |
          set -eo pipefail
          mkdir -p "$OUTPUT_PATH"
          BC_PROV=bcprov-${{ matrix.bc_artifact }}-${{ matrix.bc_version }}.jar
          BC_PKIX=bcpkix-${{ matrix.bc_version }}.jar
          cp "$AOSP_DIR/build/tools/signapk/dist/signapk.jar" "$OUTPUT_PATH/signapk_${{ matrix.android_branch }}_bc${{ matrix.bc_version }}.jar"
          cp "${{ env.BC_BASE_DIR }}/bc-${{ matrix.bc_version }}/$BC_PROV" "$OUTPUT_PATH/"
          cp "${{ env.BC_BASE_DIR }}/bc-${{ matrix.bc_version }}/$BC_PKIX" "$OUTPUT_PATH/"
          cat > "$OUTPUT_PATH/README.md" << EOF
          # signapk.jar Build Info
          - AOSP Branch: ${{ matrix.android_branch }}
          - BouncyCastle: ${{ matrix.bc_version }} (${{ matrix.bc_artifact }})
          - Build JDK: ${{ matrix.java_version }}

          ## Linux / macOS 签名命令
          \`\`\`bash
          java -cp "signapk_${{ matrix.android_branch }}_bc${{ matrix.bc_version }}.jar:$BC_PROV:$BC_PKIX" \\
          com.android.signapk platform.x509.pem platform.pk8 raw.apk signed.apk
          \`\`\`
          ## Windows CMD 签名命令（使用;分隔依赖）
          \`\`\`cmd
          java -cp "signapk_${{ matrix.android_branch }}_bc${{ matrix.bc_version }}.jar;$BC_PROV;$BC_PKIX" com.android.signapk platform.x509.pem platform.pk8 raw.apk signed.apk
          \`\`\`
          EOF
          ls -lh "$OUTPUT_PATH/"
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: signapk-${{ matrix.android_branch }}-bc${{ matrix.bc_version }}
          path: ${{ env.OUTPUT_DIR }}/${{ matrix.android_branch }}
          retention-days: 14
  post-build:
    name: Build Summary Report
    runs-on: ubuntu-latest
    needs: build-signapk
    if: always()
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
      - name: Generate Build Report
        run: |
          set -eo pipefail
          echo "# SignApk Build Summary $(date -u)" > build-report.md
          for dir in all-artifacts/*; do
            if [ -d "$dir" ]; then
              branch=$(basename "$dir" | sed -E 's/signapk-(.*)-bc[0-9.]+/\1/')
              bcver=$(basename "$dir" | grep -o 'bc[0-9.]*')
              echo "### $branch ($bcver)" >> build-report.md
              ls -lh "$dir" | awk '{print "- " $9 " (" $5 ")"}' >> build-report.md
              echo "" >> build-report.md
            fi
          done
          cat build-report.md
      - name: Upload Summary
        uses: actions/upload-artifact@v4
        with:
          name: build-summary-report
          path: build-report.md
